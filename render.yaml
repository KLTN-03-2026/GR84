services:
  - type: web
    name: dating-app-api
    env: node
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: npm ci --only=production
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_CALLBACK_URL
        value: https://dating-app-api.onrender.com/api/auth/google/callback
      - key: FRONTEND_URL
        value: https://dating-app-frontend.vercel.app
      - key: ALLOWED_ORIGINS
        value: https://dating-deploy-kxhn.vercel.app
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: MAX_FILE_SIZE
        value: 5242880
